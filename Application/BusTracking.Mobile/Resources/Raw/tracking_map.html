<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        let map, busMarker, accuracyCircle;
        let routePath = null;
        let stopMarkers = [];
        let currentLat = null, currentLng = null;
        let animationFrame = null;
        let userPanned = false;
        let lastHeading = 0;
        let routeBounds = null;
        let mapReady = false;
        const pendingCalls = [];

        // Beautiful Amber / Yellow School Bus SVG Icon (with windshield, headlights, side mirrors)
        function getBusIcon(headingDeg) {
            const h = Math.round(headingDeg || 0);
            return {
                url: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
                            <g transform="rotate(${h} 22 22)">
                                <!-- Main Vehicle Chassis (Amber School Bus Body) -->
                                <rect x="13" y="4" width="18" height="36" rx="5" fill="#f59e0b" stroke="#ffffff" stroke-width="2.5"/>
                                <!-- Front Windshield -->
                                <rect x="15" y="8" width="14" height="7" rx="1.5" fill="#0f172a"/>
                                <!-- Rear Window -->
                                <rect x="15" y="32" width="14" height="3" rx="1" fill="#334155"/>
                                <!-- Roof Panel -->
                                <rect x="16" y="17" width="12" height="13" rx="2" fill="#d97706" opacity="0.6"/>
                                <!-- Side Mirrors -->
                                <rect x="9" y="9" width="4" height="3.5" rx="1" fill="#0f172a"/>
                                <rect x="31" y="9" width="4" height="3.5" rx="1" fill="#0f172a"/>
                                <!-- Headlights -->
                                <circle cx="15.5" cy="5.5" r="1.5" fill="#fef08a"/>
                                <circle cx="28.5" cy="5.5" r="1.5" fill="#fef08a"/>
                            </g>
                        </svg>
                    `),
                anchor: new google.maps.Point(22, 22),
                scaledSize: new google.maps.Size(44, 44)
            };
        }

        // Green pickup pin for the trip's starting stop
        function getStartPinIcon() {
            return {
                url: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48">
                            <path d="M18 2C9.7 2 3 8.7 3 17c0 11 15 27 15 27s15-16 15-27c0-8.3-6.7-15-15-15z" fill="#16a34a" stroke="#ffffff" stroke-width="2.5"/>
                            <circle cx="18" cy="17" r="7" fill="#ffffff"/>
                            <circle cx="18" cy="17" r="4" fill="#16a34a"/>
                        </svg>
                    `),
                anchor: new google.maps.Point(18, 45),
                scaledSize: new google.maps.Size(36, 48)
            };
        }

        // Red destination flag for final stop
        function getEndPinIcon() {
            return {
                url: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48">
                            <path d="M18 2C9.7 2 3 8.7 3 17c0 11 15 27 15 27s15-16 15-27c0-8.3-6.7-15-15-15z" fill="#dc2626" stroke="#ffffff" stroke-width="2.5"/>
                            <circle cx="18" cy="17" r="7" fill="#ffffff"/>
                            <rect x="14.5" y="13" width="7" height="8" fill="#dc2626"/>
                            <rect x="14.5" y="13" width="2" height="8" fill="#ffffff"/>
                            <rect x="18" y="13" width="2" height="8" fill="#ffffff"/>
                        </svg>
                    `),
                anchor: new google.maps.Point(18, 45),
                scaledSize: new google.maps.Size(36, 48)
            };
        }

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 16,
                center: { lat: 28.6139, lng: 77.2090 },
                mapTypeId: 'roadmap',
                disableDefaultUI: true,
                zoomControl: true,
                gestureHandling: 'greedy',
                styles: [
                    { elementType: 'geometry', stylers: [{ color: '#f8fafc' }] },
                    { elementType: 'labels.text.fill', stylers: [{ color: '#475569' }] },
                    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
                    { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#e2e8f0' }] },
                    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#cbd5e1' }] },
                ]
            });

            busMarker = new google.maps.Marker({
                map: map,
                icon: getBusIcon(0),
                title: 'School Bus',
                optimized: false,
                visible: true,
                zIndex: 999
            });

            accuracyCircle = new google.maps.Circle({
                map: map,
                strokeColor: '#f59e0b',
                strokeOpacity: 0.4,
                strokeWeight: 1.5,
                fillColor: '#f59e0b',
                fillOpacity: 0.12,
                radius: 35
            });

            map.addListener('dragstart', () => { userPanned = true; });
            busMarker.addListener('click', () => {
                userPanned = false;
                if (busMarker.getPosition()) {
                    map.panTo(busMarker.getPosition());
                }
            });

            mapReady = true;
            while (pendingCalls.length > 0) {
                const call = pendingCalls.shift();
                call();
            }
        }

        // Checks if a location ping is valid for the current route (rejects California emulator pings > 100km)
        function isLocationValidForRoute(lat, lng) {
            if (!routeBounds || !google.maps.geometry || !google.maps.geometry.spherical) return true;
            const center = routeBounds.getCenter();
            const pos = new google.maps.LatLng(lat, lng);
            const distMeters = google.maps.geometry.spherical.computeDistanceBetween(center, pos);
            return distMeters <= 100000; // 100 km radius
        }

        window.moveBus = function (lat, lng, headingDeg) {
            if (!mapReady) { pendingCalls.push(() => window.moveBus(lat, lng, headingDeg)); return; }
            if (!lat || !lng) return;
            lat = Number(lat);
            lng = Number(lng);
            if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) return;

            // Reject invalid GPS pings (e.g. Android emulator default location in California)
            if (!isLocationValidForRoute(lat, lng)) {
                console.warn('GPS ping ignored because it is out of route bounds:', lat, lng);
                return;
            }

            const newPos = new google.maps.LatLng(lat, lng);
            busMarker.setVisible(true);

            if (currentLat === null) {
                currentLat = lat;
                currentLng = lng;
                busMarker.setPosition(newPos);
                accuracyCircle.setCenter(newPos);
            } else {
                let heading = headingDeg;
                if ((heading === null || heading === undefined || heading === 0) && google.maps.geometry && google.maps.geometry.spherical) {
                    const fromPos = new google.maps.LatLng(currentLat, currentLng);
                    const dist = google.maps.geometry.spherical.computeDistanceBetween(fromPos, newPos);
                    if (dist > 2) {
                        heading = google.maps.geometry.spherical.computeHeading(fromPos, newPos);
                    } else {
                        heading = lastHeading;
                    }
                }

                if (heading !== null && heading !== undefined && Math.abs(heading - lastHeading) >= 5) {
                    lastHeading = Math.round(heading);
                    busMarker.setIcon(getBusIcon(lastHeading));
                }

                animateTo(currentLat, currentLng, lat, lng, 1200);
                currentLat = lat;
                currentLng = lng;
            }
        };

        window.setRouteStops = function (stopsJson) {
            if (!mapReady) { pendingCalls.push(() => window.setRouteStops(stopsJson)); return; }

            stopMarkers.forEach(m => m.setMap(null));
            stopMarkers = [];

            const stops = typeof stopsJson === 'string' ? JSON.parse(stopsJson) : stopsJson;
            const pathCoords = [];
            const bounds = new google.maps.LatLngBounds();

            const validStops = stops.filter(s => s.lat && s.lng);
            const minOrder = validStops.length ? Math.min(...validStops.map(s => s.order)) : null;
            const maxOrder = validStops.length ? Math.max(...validStops.map(s => s.order)) : null;

            validStops.forEach(stop => {
                const pos = { lat: Number(stop.lat), lng: Number(stop.lng) };
                pathCoords.push(pos);
                bounds.extend(pos);

                const isStart = stop.order === minOrder;
                const isEnd = stop.order === maxOrder && maxOrder !== minOrder;

                let marker;
                if (isStart) {
                    marker = new google.maps.Marker({
                        map, position: pos,
                        title: `Start · ${stop.label}`,
                        icon: getStartPinIcon(),
                        zIndex: 60
                    });
                } else if (isEnd) {
                    marker = new google.maps.Marker({
                        map, position: pos,
                        title: `End · ${stop.label}`,
                        icon: getEndPinIcon(),
                        zIndex: 60
                    });
                } else {
                    const color = stop.status === 'Departed' ? '#22c55e'
                        : stop.status === 'Reached' ? '#f59e0b'
                            : '#1e3a8a';

                    marker = new google.maps.Marker({
                        map, position: pos,
                        title: `${stop.order}. ${stop.label}`,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 10,
                            fillColor: color,
                            fillOpacity: 1,
                            strokeColor: '#ffffff',
                            strokeWeight: 2.5
                        },
                        label: { text: String(stop.order), color: '#ffffff', fontSize: '11px', fontWeight: 'bold' },
                        zIndex: 50
                    });
                }

                const infoWin = new google.maps.InfoWindow({
                    content: `<div style="font-size:13px;font-weight:bold">${isStart ? '🟢 Start · ' : isEnd ? '🏁 End · ' : ''}${stop.label}</div>
                            <div style="font-size:11px;color:#666">Stop ${stop.order} · ${stop.status}</div>`
                });
                marker.addListener('click', () => infoWin.open(map, marker));
                stopMarkers.push(marker);
            });

            if (routePath) routePath.setMap(null);
            routeBounds = null;

            if (pathCoords.length > 0) {
                routePath = new google.maps.Polyline({
                    map, path: pathCoords, geodesic: true,
                    strokeColor: '#2563eb', strokeOpacity: 0.85, strokeWeight: 5
                });

                if (!bounds.isEmpty()) {
                    routeBounds = bounds;
                }

                // ALWAYS display bus icon immediately at Stop 1 (Start Point) on route load
                currentLat = pathCoords[0].lat;
                currentLng = pathCoords[0].lng;
                const startPos = new google.maps.LatLng(currentLat, currentLng);
                busMarker.setPosition(startPos);
                busMarker.setIcon(getBusIcon(0));
                busMarker.setVisible(true);
                accuracyCircle.setCenter(startPos);
                accuracyCircle.setVisible(true);

                if (!userPanned && map) {
                    map.fitBounds(routeBounds, 50);
                }
            }
        };

        window.onTripEnded = function () {
            if (!mapReady) { pendingCalls.push(() => window.onTripEnded()); return; }
            const infoWin = new google.maps.InfoWindow({
                content: '<div style="font-size:14px;font-weight:bold;color:#ef4444">🏁 Trip Ended</div>'
            });
            infoWin.open(map, busMarker);
        };

        function animateTo(fromLat, fromLng, toLat, toLng, durationMs) {
            const startTime = performance.now();
            if (animationFrame) cancelAnimationFrame(animationFrame);

            function step(now) {
                const t = Math.min((now - startTime) / durationMs, 1);
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                const lat = fromLat + (toLat - fromLat) * ease;
                const lng = fromLng + (toLng - fromLng) * ease;
                const pos = new google.maps.LatLng(lat, lng);
                busMarker.setPosition(pos);
                accuracyCircle.setCenter(pos);
                busMarker.setVisible(true);
                if (t < 1) {
                    animationFrame = requestAnimationFrame(step);
                } else {
                    currentLat = toLat;
                    currentLng = toLng;
                }
            }
            animationFrame = requestAnimationFrame(step);
        }
    </script>

    <!--
      YOUR_GOOGLE_MAPS_API_KEY is replaced at runtime by GoogleMapKeyHolder.GetMapHtmlAsync()
      which reads the key from AppConfig table (key: "GoogleMapApiKey").
      Never hardcode the real key here.
    -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap&libraries=geometry"
            async defer></script>
</body>
</html>
