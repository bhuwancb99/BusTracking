<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
    let map, busMarker, accuracyCircle;
        let routePath = null;
        let stopMarkers = [];
        let currentLat = null, currentLng = null;
        let animationFrame = null;
        let userPanned = false;

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 16,
                center: { lat: 28.6139, lng: 77.2090 },
                mapTypeId: 'roadmap',
                disableDefaultUI: true,
                zoomControl: true,
                gestureHandling: 'greedy',
                styles: [
                    { elementType: 'geometry', stylers: [{ color: '#f5f5f5' }] },
                    { elementType: 'labels.text.fill', stylers: [{ color: '#616161' }] },
                    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
                    { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#e8e8e8' }] },
                    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c9d8f0' }] },
                ]
            });

            busMarker = new google.maps.Marker({
                map,
                icon: {
                    path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                    scale: 6,
                    fillColor: '#4285F4',
                    fillOpacity: 1,
                    strokeColor: '#ffffff',
                    strokeWeight: 2,
                    rotation: 0
                },
                title: 'School Bus',
                optimized: true,
                zIndex: 100
            });

            accuracyCircle = new google.maps.Circle({
                map,
                strokeColor: '#4285F4',
                strokeOpacity: 0.3,
                strokeWeight: 1,
                fillColor: '#4285F4',
                fillOpacity: 0.1,
                radius: 40
            });

            map.addListener('dragstart', () => { userPanned = true; });
            busMarker.addListener('click', () => {
                userPanned = false;
                map.panTo(busMarker.getPosition());
            });
        }

        let routeBounds = null;

        window.moveBus = function (lat, lng, headingDeg) {
            if (!lat || !lng) return;
            const newPos = new google.maps.LatLng(lat, lng);

            if (currentLat === null) {
                busMarker.setPosition(newPos);
                accuracyCircle.setCenter(newPos);
                currentLat = lat;
                currentLng = lng;
                if (!routeBounds) {
                    map.panTo(newPos);
                }
            } else {
                animateTo(currentLat, currentLng, lat, lng, 800);
            }

            // Rotate arrow to face direction of travel
            if (headingDeg || headingDeg === 0) {
                var icon = busMarker.getIcon();
                icon.rotation = headingDeg;
                busMarker.setIcon(icon);
            }
        };

        window.setRouteStops = function (stopsJson) {
            stopMarkers.forEach(m => m.setMap(null));
            stopMarkers = [];

            const stops = typeof stopsJson === 'string' ? JSON.parse(stopsJson) : stopsJson;
            const pathCoords = [];
            const bounds = new google.maps.LatLngBounds();

            stops.forEach(stop => {
                if (!stop.lat || !stop.lng) return;
                const pos = { lat: Number(stop.lat), lng: Number(stop.lng) };
                pathCoords.push(pos);
                bounds.extend(pos);

                const color = stop.status === 'Departed' ? '#22c55e'
                    : stop.status === 'Reached' ? '#f59e0b'
                        : '#00288e';

                const marker = new google.maps.Marker({
                    map, position: pos,
                    title: `${stop.order}. ${stop.label}`,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 9,
                        fillColor: color,
                        fillOpacity: 1,
                        strokeColor: '#ffffff',
                        strokeWeight: 2
                    },
                    label: { text: String(stop.order), color: '#ffffff', fontSize: '10px', fontWeight: 'bold' },
                    zIndex: 50
                });

                const infoWin = new google.maps.InfoWindow({
                    content: `<div style="font-size:13px;font-weight:bold">${stop.label}</div>
                    <div style="font-size:11px;color:#666">Stop ${stop.order} · ${stop.status}</div>`
                });
                marker.addListener('click', () => infoWin.open(map, marker));
                stopMarkers.push(marker);
            });

            if (routePath) routePath.setMap(null);
            if (pathCoords.length > 0) {
                routePath = new google.maps.Polyline({
                    map, path: pathCoords, geodesic: true,
                    strokeColor: '#00288e', strokeOpacity: 0.8, strokeWeight: 5
                });
                if (!bounds.isEmpty()) {
                    routeBounds = bounds;
                    map.fitBounds(bounds);
                }
            }
        };

        window.onTripEnded = function () {
            const infoWin = new google.maps.InfoWindow({
                content: '<div style="font-size:14px;font-weight:bold;color:#ef4444">🏁 Trip Ended</div>'
            });
            infoWin.open(map, busMarker);
        };

        function animateTo(fromLat, fromLng, toLat, toLng, durationMs) {
            const startTime = performance.now();
            if (animationFrame) cancelAnimationFrame(animationFrame);

            function step(now) {
                const t = Math.min((now - startTime) / durationMs, 1);
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                const lat = fromLat + (toLat - fromLat) * ease;
                const lng = fromLng + (toLng - fromLng) * ease;
                const pos = new google.maps.LatLng(lat, lng);
                busMarker.setPosition(pos);
                accuracyCircle.setCenter(pos);
                if (t < 1) animationFrame = requestAnimationFrame(step);
                else { currentLat = toLat; currentLng = toLng; }
            }
            animationFrame = requestAnimationFrame(step);
        }</script>

    <!--
      YOUR_GOOGLE_MAPS_API_KEY is replaced at runtime by GoogleMapKeyHolder.GetMapHtmlAsync()
      which reads the key from AppConfig table (key: "GoogleMapApiKey").
      Never hardcode the real key here.
    -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap&libraries=geometry"
            async defer></script>
</body>
</html>
