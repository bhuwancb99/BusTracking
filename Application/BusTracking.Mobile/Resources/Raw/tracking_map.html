<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // ── State ──────────────────────────────────────────────────────────────────
        let map, busMarker, accuracyCircle;
        let routePath = null;
        let stopMarkers = [];
        let currentLat = null, currentLng = null;
        let animationFrame = null;
        const BUS_ICON_URL = 'bus_top.png';   // place bus_top.png in Resources/Raw/

        // ── Init ───────────────────────────────────────────────────────────────────
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 16,
                center: { lat: 28.6139, lng: 77.2090 },   // will move on first location update
                mapTypeId: 'roadmap',
                disableDefaultUI: true,
                zoomControl: true,
                gestureHandling: 'greedy',
                styles: [                                   // subtle Uber-style grey palette
                    { elementType: 'geometry', stylers: [{ color: '#f5f5f5' }] },
                    { elementType: 'labels.text.fill', stylers: [{ color: '#616161' }] },
                    {
                        featureType: 'road', elementType: 'geometry',
                        stylers: [{ color: '#ffffff' }]
                    },
                    {
                        featureType: 'road.arterial', elementType: 'geometry',
                        stylers: [{ color: '#e8e8e8' }]
                    },
                    {
                        featureType: 'water', elementType: 'geometry',
                        stylers: [{ color: '#c9d8f0' }]
                    },
                ]
            });

            // Bus marker — rotatable icon, smooth animation like Uber
            busMarker = new google.maps.Marker({
                map,
                icon: {
                    url: BUS_ICON_URL,
                    scaledSize: new google.maps.Size(42, 42),
                    anchor: new google.maps.Point(21, 21),
                },
                title: 'School Bus',
                optimized: true,
                zIndex: 100
            });

            // Pulse circle around bus
            accuracyCircle = new google.maps.Circle({
                map,
                strokeColor: '#4285F4',
                strokeOpacity: 0.3,
                strokeWeight: 1,
                fillColor: '#4285F4',
                fillOpacity: 0.1,
                radius: 40
            });
        }

        // ── Called by ViewModel via JS interop ────────────────────────────────────

        // Smoothly animate bus from old position to new — same as Uber/Ola
        window.moveBus = function (lat, lng, headingDeg) {
            const newPos = new google.maps.LatLng(lat, lng);

            if (currentLat === null) {
                // First fix — snap immediately and centre map
                busMarker.setPosition(newPos);
                accuracyCircle.setCenter(newPos);
                map.panTo(newPos);
                currentLat = lat;
                currentLng = lng;
            } else {
                // Smooth interpolation over 800ms (hides the 5-second ping gap)
                animateTo(currentLat, currentLng, lat, lng, headingDeg, 800);
            }

            // Rotate bus icon to face direction of travel
            rotateBusIcon(headingDeg);

            // Auto-follow: keep bus centred unless user has panned away
            if (!userPanned) map.panTo(newPos);
        };

        window.setRouteStops = function (stopsJson) {
            // Clear old stop markers
            stopMarkers.forEach(m => m.setMap(null));
            stopMarkers = [];

            const stops = JSON.parse(stopsJson);
            const pathCoords = [];

            stops.forEach(stop => {
                const pos = { lat: stop.lat, lng: stop.lng };
                pathCoords.push(pos);

                const color = stop.status === 'Departed' ? '#22c55e'
                    : stop.status === 'Reached' ? '#f59e0b'
                        : '#6366f1';

                const marker = new google.maps.Marker({
                    map,
                    position: pos,
                    title: `${stop.order}. ${stop.label}`,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 8,
                        fillColor: color,
                        fillOpacity: 1,
                        strokeColor: '#fff',
                        strokeWeight: 2
                    },
                    label: {
                        text: String(stop.order),
                        color: '#fff',
                        fontSize: '10px',
                        fontWeight: 'bold'
                    },
                    zIndex: 50
                });

                const infoWin = new google.maps.InfoWindow({
                    content: `<div style="font-size:13px;font-weight:bold">${stop.label}</div>
                    <div style="font-size:11px;color:#666">Stop ${stop.order} · ${stop.status}</div>`
                });
                marker.addListener('click', () => infoWin.open(map, marker));
                stopMarkers.push(marker);
            });

            // Draw the route polyline
            if (routePath) routePath.setMap(null);
            routePath = new google.maps.Polyline({
                map,
                path: pathCoords,
                geodesic: true,
                strokeColor: '#6366f1',
                strokeOpacity: 0.7,
                strokeWeight: 4
            });
        };

        window.onTripEnded = function () {
            // Show a static "Trip Ended" info window on the bus marker
            const infoWin = new google.maps.InfoWindow({
                content: '<div style="font-size:14px;font-weight:bold;color:#ef4444">🏁 Trip Ended</div>'
            });
            infoWin.open(map, busMarker);
        };

        // ── Smooth animation helper ────────────────────────────────────────────────
        function animateTo(fromLat, fromLng, toLat, toLng, heading, durationMs) {
            const startTime = performance.now();
            if (animationFrame) cancelAnimationFrame(animationFrame);

            function step(now) {
                const t = Math.min((now - startTime) / durationMs, 1);
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;       // ease-in-out
                const lat = fromLat + (toLat - fromLat) * ease;
                const lng = fromLng + (toLng - fromLng) * ease;
                const pos = new google.maps.LatLng(lat, lng);
                busMarker.setPosition(pos);
                accuracyCircle.setCenter(pos);
                if (t < 1) animationFrame = requestAnimationFrame(step);
                else { currentLat = toLat; currentLng = toLng; }
            }
            animationFrame = requestAnimationFrame(step);
        }

        // ── Rotate bus icon ────────────────────────────────────────────────────────
        function rotateBusIcon(deg) {
            // Google Maps doesn't support icon rotation natively for URL icons;
            // we use an SVG symbol instead when heading is known:
            if (!deg && deg !== 0) return;
            busMarker.setIcon({
                path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z' +
                    'M12 11.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
                fillColor: '#4285F4',
                fillOpacity: 1,
                strokeColor: '#ffffff',
                strokeWeight: 2,
                scale: 1.4,
                anchor: new google.maps.Point(12, 12),
                rotation: deg
            });
        }

        // ── Detect if user has manually panned the map ────────────────────────────
        let userPanned = false;
        // (set after map is ready)
        function attachPanListener() {
            map.addListener('dragstart', () => { userPanned = true; });
            // Resume auto-follow when user double-taps / clicks bus
            busMarker.addListener('click', () => {
                userPanned = false;
                map.panTo(busMarker.getPosition());
            });
        }
    </script>

    <!-- Replace YOUR_API_KEY with the key from Google Cloud Console -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD0wDrOFX7WvrSQhpmXs6EZMD5YgJENpN8&callback=initMap&libraries=geometry"
            async defer
            onload="attachPanListener()"></script>
</body>
</html>
