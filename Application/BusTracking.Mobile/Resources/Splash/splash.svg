<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Scaled to 65% and perfectly centered mathematically (accounting for vertical center of the bus shape at y=235) -->
    <g transform="translate(89.6, 103.25) scale(0.65)">
        <!-- White Bus Group -->
        <g fill="#FFFFFF">
            <!-- Bus Roof & Top Sign -->
            <path d="M 156 120 
                     C 156 110, 356 110, 356 120
                     L 356 135
                     C 356 140, 156 140, 156 135
                     Z"/>
            
            <!-- Bus Body Main outline (front view) -->
            <path d="M 140 150
                     C 140 135, 170 130, 256 130
                     C 342 130, 372 135, 372 150
                     L 372 320
                     C 372 335, 356 340, 340 340
                     L 340 360
                     C 340 365, 310 365, 310 360
                     L 310 340
                     L 202 340
                     L 202 360
                     C 202 365, 172 365, 172 360
                     L 172 340
                     C 156 340, 140 335, 140 320
                     Z"/>
        </g>
        
        <!-- Windshield (Blue cutout) -->
        <rect x="160" y="160" width="192" height="95" rx="12" fill="#184E8A"/>
        
        <!-- Left & Right Mirrors (White) -->
        <path d="M 140 180 C 115 180, 115 190, 115 195 L 115 225 C 115 230, 125 230, 125 225 L 125 200 C 125 195, 140 195, 140 190 Z" fill="#FFFFFF"/>
        <path d="M 372 180 C 397 180, 397 190, 397 195 L 397 225 C 397 230, 387 230, 387 225 L 387 200 C 387 195, 372 195, 372 190 Z" fill="#FFFFFF"/>
        
        <!-- Headlights (Blue circular cutouts on white body) -->
        <circle cx="180" cy="300" r="15" fill="#184E8A"/>
        <circle cx="332" cy="300" r="15" fill="#184E8A"/>
        
        <!-- Grill lines (Blue horizontal lines on white body) -->
        <rect x="210" y="275" width="92" height="6" rx="3" fill="#184E8A"/>
        <rect x="210" y="287" width="92" height="6" rx="3" fill="#184E8A"/>
        <rect x="210" y="299" width="92" height="6" rx="3" fill="#184E8A"/>
        <rect x="220" y="311" width="72" height="6" rx="3" fill="#184E8A"/>
        
        <!-- Location Pin (White overlay with Blue center) -->
        <path d="M 256 185
                 C 223 185, 210 215, 210 240
                 C 210 275, 256 318, 256 318
                 C 256 318, 302 275, 302 240
                 C 302 215, 289 185, 256 185
                 Z" fill="#FFFFFF" stroke="#184E8A" stroke-width="6"/>
        
        <!-- Circle in location pin (Blue) -->
        <circle cx="256" cy="235" r="16" fill="#184E8A"/>
    </g>
</svg>